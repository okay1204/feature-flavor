services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: feature_flavor
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/setup.sql:/docker-entrypoint-initdb.d/01-setup.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feature_flavor"]
      interval: 2s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: feature_flavor
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: local_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
